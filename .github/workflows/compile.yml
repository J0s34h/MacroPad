name: Compile Arduino Sketch (macOS arm64)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: self-hosted
    env:
      # Use a persistent location for Arduino data (under the user's home)
      ARDUINO_DIRECTORIES_DATA: /Users/gh-runner/arduino-data
      RUNNER_TOOL_CACHE: /Users/gh-runner/hostedtoolcache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------- arduino-cli installation (skip if present) -------
      - name: Check if arduino-cli is already installed
        id: check-arduino-cli
        run: |
          if command -v arduino-cli &> /dev/null; then
            echo "arduino-cli found in PATH"
            echo "installed=true" >> $GITHUB_OUTPUT
          elif [ -f "$HOME/.local/bin/arduino-cli" ]; then
            echo "arduino-cli found at ~/.local/bin/arduino-cli"
            echo "$HOME/.local/bin" >> $GITHUB_PATH
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "arduino-cli not found"
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install arduino-cli
        if: steps.check-arduino-cli.outputs.installed == 'false'
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          mkdir -p "$HOME/.local/bin"
          mv bin/arduino-cli "$HOME/.local/bin/"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      # -----------------------------------------------------------

      - name: Install Python 3.11 with Homebrew
        run: |
          brew update
          brew install python@3.11
          echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: python3 -m venv venv

      - name: Activate venv and set as default Python
        run: |
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
          echo "$PWD/venv/bin" >> $GITHUB_PATH

      - name: Install pyyaml
        run: |
          pip install --upgrade pip
          pip install pyyaml

      - name: Set temporary directory for build tools
        run: |
          echo "TMPDIR=${{ runner.temp }}" >> $GITHUB_ENV
          mkdir -p "${{ runner.temp }}"

      - name: Configure arduino-cli and install core (if needed)
        id: build
        run: |
          mkdir -p "$ARDUINO_DIRECTORIES_DATA"

          python3 <<EOF
          import yaml
          import subprocess
          import os

          with open('sketch.yaml') as f:
              data = yaml.safe_load(f)

          profile_name = data.get('default_profile', 'release')
          profile = data['profiles'][profile_name]

          platform_info = profile['platforms'][0]
          url = platform_info['platform_index_url']
          subprocess.run(['arduino-cli', 'config', 'add', 'board_manager.additional_urls', url], check=True)

          subprocess.run(['arduino-cli', 'core', 'update-index'], check=True)

          platform_str = platform_info['platform']
          if '(' in platform_str:
              core, version = platform_str.rsplit('(', 1)
              core = core.strip()
              version = version.strip(')')
              core_spec = f"{core}@{version}"
          else:
              core_spec = platform_str.strip()

          # Check if the required core is already installed
          installed_cores = subprocess.run(['arduino-cli', 'core', 'list'], capture_output=True, text=True).stdout
          installed = set()
          for line in installed_cores.splitlines():
              parts = line.split()
              if len(parts) >= 2:
                  core_id = parts[0]
                  ver = parts[1]
                  installed.add((core_id, ver))

          # Extract core ID and version from core_spec
          if '@' in core_spec:
              core_id, required_ver = core_spec.split('@', 1)
          else:
              core_id = core_spec
              required_ver = None

          # If the exact version is installed, skip installation
          if required_ver and (core_id, required_ver) in installed:
              print(f"Core {core_spec} already installed, skipping installation.")
          else:
              subprocess.run(['arduino-cli', 'core', 'install', core_spec], check=True)

          fqbn = profile['fqbn']
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"fqbn={fqbn}\n")
          EOF

      - name: Find sketch
        id: find-sketch
        run: |
          INO_FILE=$(find . -name "*.ino" -print -quit)
          if [ -z "$INO_FILE" ]; then
            echo "No .ino file found in the repository"
            exit 1
          fi
          SKETCH_DIR=$(dirname "$INO_FILE")
          echo "sketch-dir=$SKETCH_DIR" >> $GITHUB_OUTPUT
          echo "Found sketch in $SKETCH_DIR"

      - name: Compile sketch
        run: |
          arduino-cli compile --fqbn "${{ steps.build.outputs.fqbn }}" "${{ steps.find-sketch.outputs.sketch-dir }}"