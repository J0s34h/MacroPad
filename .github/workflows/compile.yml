name: Compile Arduino Sketch (macOS arm64)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: self-hosted
    env:
      RUNNER_TOOL_CACHE: /Users/gh-runner/hostedtoolcache
      ARDUINO_DATA_DIR: ${{ github.workspace }}/arduino-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- Cache Arduino data ----------
      - name: Cache Arduino core and libraries
        id: cache-arduino
        uses: actions/cache@v4
        with:
          path: ${{ env.ARDUINO_DATA_DIR }}
          key: arduino-${{ hashFiles('sketch.yaml') }}-${{ runner.os }}
          restore-keys: |
            arduino-${{ runner.os }}-
          save-always: true   # Save cache even if a later step fails (so partial downloads aren't lost)

      - name: Create Python tool cache directory
        run: mkdir -p "$RUNNER_TOOL_CACHE"

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          mkdir -p "$HOME/.local/bin"
          mv bin/arduino-cli "$HOME/.local/bin/"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python 3.11 with Homebrew
        run: |
          brew update
          brew install python@3.11
          echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: python3 -m venv venv

      - name: Activate venv and set as default Python
        run: |
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
          echo "$PWD/venv/bin" >> $GITHUB_PATH

      - name: Install pyyaml
        run: |
          pip install --upgrade pip
          pip install pyyaml

      # ---------- Extract profile info ----------
      - name: Get profile name and libraries
        id: profile
        run: |
          python3 <<EOF
          import yaml
          import json
          import os

          with open('sketch.yaml') as f:
              data = yaml.safe_load(f)

          profile_name = data.get('default_profile', 'release')
          profile = data['profiles'][profile_name]

          # Save profile name
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"name={profile_name}\n")

          # Extract libraries list (as JSON array for later steps)
          libs = profile.get('libraries', [])
          lib_list = []
          for lib in libs:
              # Format: "LibraryName (version)" or just "LibraryName"
              if '(' in lib and ')' in lib:
                  name = lib[:lib.rfind('(')].strip()
                  version = lib[lib.rfind('(')+1:lib.rfind(')')].strip()
                  lib_list.append(f"{name}@{version}")
              else:
                  lib_list.append(lib)  # no version specified

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"libraries={json.dumps(lib_list)}\n")
          EOF

      # ---------- Configure arduino-cli ----------
      - name: Configure arduino-cli and update index
        env:
          ARDUINO_DIRECTORIES_DATA: ${{ env.ARDUINO_DATA_DIR }}
        run: |
          arduino-cli config add board_manager.additional_urls https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
          arduino-cli core update-index

      # ---------- Install core (with retries) ----------
      - name: Install RP2040 core
        env:
          ARDUINO_DIRECTORIES_DATA: ${{ env.ARDUINO_DATA_DIR }}
        run: |
          if ! arduino-cli core list | grep -q "rp2040:rp2040"; then
            echo "Core not found. Installing..."
            for i in {1..3}; do
              arduino-cli core install rp2040:rp2040 && break || sleep 5
            done
          else
            echo "Core already installed."
          fi

      # ---------- Install libraries explicitly (with retries) ----------
      - name: Install required libraries
        env:
          ARDUINO_DIRECTORIES_DATA: ${{ env.ARDUINO_DATA_DIR }}
        run: |
          # Parse the JSON array from the profile output
          LIBRARIES='${{ steps.profile.outputs.libraries }}'
          echo "Libraries to install: $LIBRARIES"
          if [ "$LIBRARIES" = "[]" ] || [ -z "$LIBRARIES" ]; then
            echo "No libraries defined in profile."
            exit 0
          fi

          # Use jq if available, otherwise Python fallback
          if command -v jq &> /dev/null; then
            libs=$(echo "$LIBRARIES" | jq -r '.[]')
          else
            # fallback to python one-liner
            libs=$(python3 -c "import json, sys; libs=json.loads(sys.argv[1]); print('\n'.join(libs))" "$LIBRARIES")
          fi

          for lib in $libs; do
            echo "Installing library: $lib"
            for i in {1..3}; do
              arduino-cli lib install "$lib" && break || sleep 5
            done
          done

      # ---------- Debug steps ----------
      - name: List installed cores
        env:
          ARDUINO_DIRECTORIES_DATA: ${{ env.ARDUINO_DATA_DIR }}
        run: arduino-cli core list

      - name: List Waveshare boards
        env:
          ARDUINO_DIRECTORIES_DATA: ${{ env.ARDUINO_DATA_DIR }}
        run: arduino-cli board listall | grep -i waveshare

      - name: Show board details
        env:
          ARDUINO_DIRECTORIES_DATA: ${{ env.ARDUINO_DATA_DIR }}
        run: arduino-cli board details rp2040:rp2040:waveshare_rp2040_plus || echo "Board not found"

      # ---------- Compile ----------
      - name: Compile sketch with verbose logging
        env:
          ARDUINO_DIRECTORIES_DATA: ${{ env.ARDUINO_DATA_DIR }}
        run: |
          echo "Compiling with profile: ${{ steps.profile.outputs.name }}"
          arduino-cli compile -v --profile "${{ steps.profile.outputs.name }}" . 2>&1 | tee compile.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Compilation failed. Full log:"
            cat compile.log
            exit 1
          fi