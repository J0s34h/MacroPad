name: Compile Arduino Sketch (macOS arm64)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: self-hosted
    env:
      RUNNER_TOOL_CACHE: /Users/gh-runner/hostedtoolcache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Python tool cache directory
        run: mkdir -p "$RUNNER_TOOL_CACHE"

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          mkdir -p "$HOME/.local/bin"
          mv bin/arduino-cli "$HOME/.local/bin/"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python 3.11 with Homebrew
        run: |
          brew update
          brew install python@3.11
          echo "/opt/homebrew/bin" >> $GITHUB_PATH

      # ----- Create and activate a virtual environment -----
      - name: Create virtual environment
        run: python3 -m venv venv

      - name: Activate venv and set as default Python
        run: |
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
          echo "$PWD/venv/bin" >> $GITHUB_PATH
      # -----------------------------------------------------

      - name: Install pyyaml
        run: |
          pip install --upgrade pip
          pip install pyyaml

      - name: Configure arduino-cli and install core
        id: build
        env:
          ARDUINO_DIRECTORIES_DATA: ${{ runner.temp }}/arduino-data
        run: |
          mkdir -p "$ARDUINO_DIRECTORIES_DATA"

          python3 <<EOF
          import yaml
          import subprocess
          import os

          with open('sketch.yaml') as f:
              data = yaml.safe_load(f)

          profile_name = data.get('default_profile', 'release')
          profile = data['profiles'][profile_name]

          platform_info = profile['platforms'][0]
          url = platform_info['platform_index_url']
          subprocess.run(['arduino-cli', 'config', 'add', 'board_manager.additional_urls', url], check=True)

          subprocess.run(['arduino-cli', 'core', 'update-index'], check=True)

          platform_str = platform_info['platform']
          if '(' in platform_str:
              core, version = platform_str.rsplit('(', 1)
              core = core.strip()
              version = version.strip(')')
              core_spec = f"{core}@{version}"
          else:
              core_spec = platform_str.strip()
          subprocess.run(['arduino-cli', 'core', 'install', core_spec], check=True)

          fqbn = profile['fqbn']
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"fqbn={fqbn}\n")
          EOF

      - name: Compile sketch
        env:
          ARDUINO_DIRECTORIES_DATA: ${{ runner.temp }}/arduino-data
        run: |
          arduino-cli compile --fqbn "${{ steps.build.outputs.fqbn }}" .