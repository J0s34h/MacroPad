name: Compile Arduino Sketch (macOS arm64)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: self-hosted
    env:
      ARDUINO_DIRECTORIES_DATA: /Users/gh-runner/arduino-data
      RUNNER_TOOL_CACHE: /Users/gh-runner/hostedtoolcache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----- arduino-cli installation (skip if present) -----
      - name: Check if arduino-cli is already installed
        id: check-arduino-cli
        run: |
          if command -v arduino-cli &> /dev/null; then
            echo "installed=true" >> $GITHUB_OUTPUT
          elif [ -f "$HOME/.local/bin/arduino-cli" ]; then
            echo "$HOME/.local/bin" >> $GITHUB_PATH
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install arduino-cli
        if: steps.check-arduino-cli.outputs.installed == 'false'
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          mkdir -p "$HOME/.local/bin"
          mv bin/arduino-cli "$HOME/.local/bin/"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check if Python 3.11 is already installed
        id: check-python
        run: |
          if command -v python3.11 &> /dev/null; then
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Python 3.11 with Homebrew
        if: steps.check-python.outputs.installed == 'false'
        run: |
          brew update -q
          brew install -q python@3.11
          echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: python3 -m venv venv

      - name: Activate venv and set as default Python
        run: |
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
          echo "$PWD/venv/bin" >> $GITHUB_PATH

      - name: Install pyyaml
        run: |
          pip install -q --upgrade pip
          if ! pip show pyyaml > /dev/null 2>&1; then
            pip install pyyaml
          fi

      - name: Set temporary directory for build tools
        run: |
          echo "TMPDIR=${{ runner.temp }}" >> $GITHUB_ENV
          mkdir -p "${{ runner.temp }}"

      - name: Configure arduino-cli and install core (if needed)
        id: build
        run: |
          mkdir -p "$ARDUINO_DIRECTORIES_DATA"
          python3 <<EOF
          import yaml
          import subprocess
          import os

          with open('sketch.yaml') as f:
              data = yaml.safe_load(f)

          profile_name = data.get('default_profile', 'release')
          profile = data['profiles'][profile_name]

          platform_info = profile['platforms'][0]
          url = platform_info['platform_index_url']
          subprocess.run(['arduino-cli', 'config', 'add', 'board_manager.additional_urls', url],
                         stdout=subprocess.DEVNULL, stderr=subprocess.PIPE, check=True)

          subprocess.run(['arduino-cli', 'core', 'update-index'],
                         stdout=subprocess.DEVNULL, stderr=subprocess.PIPE, check=True)

          platform_str = platform_info['platform']
          if '(' in platform_str:
              core, version = platform_str.rsplit('(', 1)
              core = core.strip()
              version = version.strip(')')
              core_spec = f"{core}@{version}"
          else:
              core_spec = platform_str.strip()

          # Check if core already installed
          installed_cores = subprocess.run(['arduino-cli', 'core', 'list'],
                                           capture_output=True, text=True).stdout
          installed = set()
          for line in installed_cores.splitlines():
              parts = line.split()
              if len(parts) >= 2:
                  core_id = parts[0]
                  ver = parts[1]
                  installed.add((core_id, ver))

          if '@' in core_spec:
              core_id, required_ver = core_spec.split('@', 1)
          else:
              core_id = core_spec
              required_ver = None

          if required_ver and (core_id, required_ver) in installed:
              # Core already present – skip installation silently
              pass
          else:
              subprocess.run(['arduino-cli', 'core', 'install', core_spec],
                             stdout=subprocess.DEVNULL, stderr=subprocess.PIPE, check=True)

          fqbn = profile['fqbn']
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"fqbn={fqbn}\n")
          EOF

      - name: Find sketch
        id: find-sketch
        run: |
          INO_FILE=$(find . -name "*.ino" -print -quit)
          if [ -z "$INO_FILE" ]; then
            echo "No .ino file found in the repository" >&2
            exit 1
          fi
          SKETCH_DIR=$(dirname "$INO_FILE")
          echo "sketch-dir=$SKETCH_DIR" >> $GITHUB_OUTPUT

      - name: Compile sketch
        id: compile
        run: |
          mkdir -p firmware_output
          arduino-cli compile --fqbn "${{ steps.build.outputs.fqbn }}" \
            --output-dir firmware_output \
            "${{ steps.find-sketch.outputs.sketch-dir }}"

      - name: Rename UF2 firmware
        run: |
          UF2_FILE=$(find firmware_output -maxdepth 1 -name "*.uf2" -print -quit)
          if [ -n "$UF2_FILE" ]; then
            mv "$UF2_FILE" firmware_output/Firmware.uf2
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware_output/Firmware.uf2